services:
  postgres:
    image: postgres:16
    container_name: flowlio-pg
    environment:
      POSTGRES_USER: flowlio
      POSTGRES_PASSWORD: flowlio_dev
      POSTGRES_DB: flowlio
    ports:
      - "5432:5432"
    volumes:
      - flowlio-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowlio"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: flowlio-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: flowlio-rabbit
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  # Local test SMTP server. Captures every message instead of delivering it and requires the client
  # to authorize with an OAuth2 bearer token via XOAUTH2 (issued by OpenIddict — see the "Smtp"
  # config). Web inbox: http://localhost:5080 — SMTP on localhost:2525.
  smtp4dev:
    image: rnwood/smtp4dev:v3
    container_name: flowlio-smtp4dev
    ports:
      - "5080:80"
      - "2525:25"
    environment:
      ServerOptions__HostName: flowlio-smtp4dev
      ServerOptions__AllowRemoteConnections: "true"
      ServerOptions__AuthenticationRequired: "true"
      # Only XOAUTH2 is offered, so a valid OAuth2 token is mandatory (no password fallback).
      ServerOptions__SmtpEnabledAuthTypesWhenNotSecureConnection: "XOAUTH2"
      # The token is accepted as presented (catcher-friendly). For strict signature/issuer/audience
      # validation against the running app, flip this to "false" and set the OAuth2* options below
      # (the app must be reachable from the container, e.g. https://host.docker.internal:5443/).
      ServerOptions__SmtpAllowAnyCredentials: "true"
      # ServerOptions__OAuth2Authority: "https://host.docker.internal:5443/"
      # ServerOptions__OAuth2Audience: "flowlio-smtp"

  # --- Observability stack -------------------------------------------------
  # The app exports OTLP to the collector (set OpenTelemetry:OtlpEndpoint or
  # OTEL_EXPORTER_OTLP_ENDPOINT to http://localhost:4317). The collector fans
  # traces out to Jaeger and exposes metrics for Prometheus; Grafana reads both.
  # Jaeger UI: http://localhost:16686 · Grafana: http://localhost:3000 · Prometheus: http://localhost:9090

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: flowlio-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: flowlio-otelcol
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      - jaeger

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: flowlio-prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:11.2.0
    container_name: flowlio-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - jaeger

volumes:
  flowlio-pgdata:
