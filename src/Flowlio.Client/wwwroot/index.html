<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flowlio – rodinný rozpočet</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="_content/Microsoft.FluentUI.AspNetCore.Components/css/reboot.css" />
    <link rel="stylesheet" href="lib/tabulator.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Flowlio.Client.styles.css" rel="stylesheet" />
    <script src="js/flowlio-theme.js"></script>
    <script src="js/flowlio-download.js"></script>
    <script src="lib/imask.min.js"></script>
    <script src="lib/tabulator.min.js"></script>
    <script src="js/flowlio-mask.js"></script>
    <script src="js/flowlio-grid.js"></script>
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="app-boot" role="status" aria-live="polite" aria-label="Načítání aplikace Flowlio">
            <div class="app-boot-logo"><span class="app-boot-mark">₣</span></div>
            <div class="app-boot-name">Flowlio</div>
            <div class="app-boot-track"><span class="app-boot-fill"></span></div>
            <div class="app-boot-text"></div>
        </div>
    </div>

    <div id="blazor-error-ui">
        Došlo k neočekávané chybě.
        <a href="." class="reload">Načíst znovu</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_content/Microsoft.AspNetCore.Components.WebAssembly.Authentication/AuthenticationService.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
